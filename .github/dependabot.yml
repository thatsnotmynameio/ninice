version: 2
updates:
  # Cargo dependencies: weekly, grouped by update kind to bundle PRs.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "00:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    rebase-strategy: auto
    groups:
      rust-patch-updates:
        patterns: ["*"]
        update-types: [patch]
      rust-minor-updates:
        patterns: ["*"]
        update-types: [minor]

  # GitHub Actions: weekly, single grouped PR.
  # Dependabot reads the `# vX.Y.Z` comment after each SHA pin and updates
  # both the SHA and the comment in lockstep.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "00:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    rebase-strategy: auto
    groups:
      github-actions:
        patterns: ["*"]
        update-types: [minor, patch]
