name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"

jobs:
  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets --all-features -- -D warnings

  typos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo doc --no-deps --all-features

  rdme:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-rdme
      - run: cargo rdme --check

  deny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  msrv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv,cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo msrv verify -- cargo check --all-features

  hack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo nextest run --all-features
      - run: cargo test --doc --all-features

  semver-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        # cargo-semver-checks needs the base branch reachable to use it as
        # the baseline; the default shallow clone (fetch-depth: 1) doesn't
        # include it. Pull the full history.
        with:
          fetch-depth: 0
      # `actions/checkout` on a PR leaves only the PR head as a named ref —
      # neither `main` nor `origin/main` exist locally even with fetch-depth 0.
      # Materialize the base branch so cargo-semver-checks can resolve
      # `<ref>^{tree}` when computing the baseline.
      - name: Materialize PR base branch as a local ref
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: git fetch origin "$BASE_REF:$BASE_REF"
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # Compare against the PR's base branch instead of crates.io — the
          # crate is not yet published. Once published, this still works
          # (and is generally preferred over the registry baseline so the
          # PR is judged against what's actually about to merge).
          baseline-rev: ${{ github.event.pull_request.base.ref }}

  sonarqube:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Sonar runs cargo clippy internally to collect findings; with the
    # workflow-level `RUSTFLAGS: -D warnings` every warning aborts the
    # scan instead of being reported. Reset it here so clippy completes
    # and the report reaches Sonar.
    env:
      RUSTFLAGS: ""
      RUSTDOCFLAGS: ""
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sonarqube
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Generate LCOV coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info --all-features
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  conclusion:
    needs: [fmt, clippy, typos, docs, rdme, deny, msrv, hack, test, semver-checks, sonarqube]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: All checks succeeded
        run: |
          jq -e 'all(.[]; .result == "success" or .result == "skipped")' \
            <<< '${{ toJSON(needs) }}'
