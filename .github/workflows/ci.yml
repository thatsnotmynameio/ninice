name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"

jobs:
  # ─── Tier 0 ─── cheap source checks, no compile. Gate everything below.

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  typos:
    name: Spelling check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run typos
        uses: crate-ci/typos@aca895bf05aec0cb7dffa6f94495e923224d9f17 # v1.46.2

  # Verifies the lib's first doc comment is in sync with README.md.
  rdme:
    name: README sync
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-rdme
      - name: Check README is in sync
        run: cargo rdme --check

  # ─── Tier 1 ─── first compilation + supply-chain audit. Gate Tier 2.

  # First real compile. If this fails, Tier 2 jobs would hit the same
  # error 4× — so we gate them on clippy passing.
  clippy:
    name: Clippy lints
    needs: [fmt, typos, rdme]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-key: lint
      - name: Run clippy on all targets and features
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Reads Cargo.lock + deny.toml; no compile required. Parallel with
  # clippy. A daily-cron variant lives in audit.yml for RustSec
  # advisories published between PRs.
  deny:
    name: Dependency audit
    needs: [fmt, typos, rdme]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/audit

  # ─── Tier 2 ─── compile-heavy jobs. Parallel once clippy proves compile
  # and deny clears advisories. Both Tier 1 jobs must succeed before any
  # Tier 2 job starts, so a single advisory or compile error short-circuits
  # ~3-4 minutes of redundant builds.

  docs:
    name: Docs build
    needs: [clippy, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: lint
      - name: Build docs (no deps, all features)
        run: cargo doc --no-deps --all-features

  # Re-checks against the crate's minimum-supported Rust version (per
  # the `rust-version` field in Cargo.toml).
  msrv:
    name: MSRV verification
    needs: [clippy, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-msrv,cargo-hack
          cache-key: msrv
      - name: Verify MSRV
        run: cargo msrv verify -- cargo check --all-features

  # cargo-hack: builds every feature combination up to depth 2 to catch
  # feature-gate breakage that single-feature builds miss.
  hack:
    name: Feature powerset
    needs: [clippy, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-hack
          cache-key: lint
      - name: Check feature powerset
        run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

  test:
    name: Test suite
    needs: [clippy, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          tools: cargo-nextest
          cache-key: test
      - name: Run unit tests with nextest
        run: cargo nextest run --all-features
      - name: Run doctests
        run: cargo test --doc --all-features

  # ─── Tier 3 ─── coverage scan. Only meaningful if tests pass.

  # Static analysis + security hotspots + duplication + complexity +
  # maintainability scoring. Coverage (LCOV generated below) is one
  # input among many, not the whole purpose.
  #
  # Sonar runs cargo clippy internally to collect findings; with the
  # workflow-level `RUSTFLAGS: -D warnings` every warning aborts the
  # scan instead of being reported. Reset it here so clippy completes
  # and the report reaches Sonar.
  sonarqube:
    name: Code quality (Sonar)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    env:
      RUSTFLAGS: ""
      RUSTDOCFLAGS: ""
    steps:
      - name: Checkout sources (full history for Sonar)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          persist-credentials: false
      - name: Install Rust toolchain with clippy and llvm-tools
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy,llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-llvm-cov
      - name: Restore cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: sonarqube
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Generate LCOV coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info --all-features
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Single required check for branch protection. Requires every upstream
  # to report success. Job key is intentionally `conclusion` (not given a
  # display name) so the `Protect main` ruleset's existing context match
  # keeps working with no surgery.
  conclusion:
    needs: [fmt, typos, rdme, clippy, deny, docs, msrv, hack, test, sonarqube]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify all required checks succeeded
        run: |
          jq -e 'all(.[]; .result == "success")' \
            <<< '${{ toJSON(needs) }}'
