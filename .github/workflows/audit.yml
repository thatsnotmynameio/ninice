name: Audit (scheduled)

# Per-PR audit runs inside ci.yml as the `deny` job, which gates the
# `conclusion` check that branch protection requires. This workflow is
# the daily safety net for RustSec advisories published between PRs.

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/audit
