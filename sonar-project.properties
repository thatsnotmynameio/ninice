sonar.projectKey=thatsnotmynameio_ninice
sonar.organization=thatsnotmynameio

# Scope analysis to actual Rust sources and tests so target/, .github/
# and other top-level files don't pollute the report.
sonar.sources=src
sonar.tests=tests

# Cargo manifest used by the Rust analyzer to discover the crate graph.
sonar.rust.cargo.manifestPaths=Cargo.toml
