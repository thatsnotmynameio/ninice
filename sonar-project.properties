sonar.projectKey=thatsnotmynameio_ninice
sonar.organization=thatsnotmynameio

# Scope analysis to actual Rust sources so target/, .github/
# and other top-level files don't pollute the report. Unit tests live
# inside `src/` under `#[cfg(test)] mod tests`; re-add `sonar.tests=tests`
# when integration tests land under `tests/`.
sonar.sources=src

# Cargo manifest used by the Rust analyzer to discover the crate graph.
sonar.rust.cargo.manifestPaths=Cargo.toml

# LCOV coverage report produced by cargo-llvm-cov in the sonarqube CI job.
sonar.rust.lcov.reportPaths=lcov.info
